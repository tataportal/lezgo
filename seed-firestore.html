    </div>

    // Logging function
    function log(message, type = 'info') {
      const logEl = document.getElementById('status-log');
      const entry = document.createElement('div');
      entry.className = `log-entry log-${type}`;
      const timestamp = new Date().toLocaleTimeString();
      entry.textContent = `[${timestamp}] ${message}`;
      logEl.appendChild(entry);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function clearLog() {
      document.getElementById('status-log').innerHTML = '';
      log('Log cleared', 'info');

      const password = document.getElementById('promoter-password').value.trim();
      const displayName = document.getElementById('promoter-name').value.trim();
      const btn = document.getElementById('btn-create-promoter');

      if (!email || !password || !displayName) {
        log('Please fill in all fields', 'error');
        return;
      }

      btn.disabled = true;
      log('Creating promoter account...', 'info');

      try {
        // Create auth user
        const userCred = await auth.createUserWithEmailAndPassword(email, password);
        const uid = userCred.user.uid;
        currentPromoterId = uid;

        // Create Firestore user doc
        await db.collection('users').doc(uid).set({
          uid: uid,
          role: 'promoter',
          displayName: displayName,
          email: email,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        log(`Promoter document created in Firestore`, 'success');
        log(`Promoter UID: ${uid}`, 'success');

        document.getElementById('seed-organizer-uid').value = uid;

    // Seed Events Function
    async function seedEvents() {
      const organizerUid = document.getElementById('seed-organizer-uid').value.trim() || currentPromoterId;
      const btn = document.getElementById('btn-seed-events');

      if (!organizerUid) {
        log('Please create a promoter account first or enter organizer UID', 'error');
        return;
      }

      btn.disabled = true;
      log(`Starting event seeding with organizer UID: ${organizerUid}`, 'info');

      let successCount = 0;
      let errorCount = 0;

      for (const event of SEED_EVENTS) {
        try {
          const eventDoc = {
            _id: event._id,
            name: event.name,
            subtitle: event.subtitle,
            date: event.date,
            dateLabel: event.dateLabel,
            venue: event.venue,
            location: event.location,
            distrito: event.distrito,
            genre: event.genre,
            status: 'published',
            organizer: organizerUid,
            promoter: event.promoter,
            image: event.image,
            description: event.description,
            descriptionLong: event.descriptionLong,
            timeStart: event.timeStart,
            timeEnd: event.timeEnd,
            tags: event.tags,
            lineup: event.lineup,
            meta: event.meta,
            prohibitedItems: event.prohibitedItems,
            visibleSections: event.visibleSections,
            address: event.address || '',
            tickets: event.tickets,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          };

          await db.collection('events').doc(event._id).set(eventDoc);
          log(`✓ Created: ${event.name}`, 'success');
          successCount++;

        } catch (error) {
          log(`✗ Failed: ${event.name} — ${error.message}`, 'error');
          errorCount++;
        }
      }

      log(`Seeding complete: ${successCount} succeeded, ${errorCount} failed`, successCount === SEED_EVENTS.length ? 'success' : 'warning');
      btn.disabled = false;
    }
  </script>
